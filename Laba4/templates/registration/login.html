{% extends 'base.html' %}

{% block title %}Вход в систему{% endblock %}

{% block content %}
<div class="form-container">
    <h2 class="page-title" style="margin-bottom: 1.5rem;">Вход в систему</h2>
    
    {% if form.errors %}
        <div style="color: var(--danger-color); margin-bottom: 1rem; font-size: 0.9rem;">
            Имя пользователя или пароль введены неверно. Пожалуйста, попробуйте еще раз.
        </div>
    {% endif %}

    <form method="post" action="{% url 'login' %}">
        {% csrf_token %}
        <div class="form-group">
            <label for="{{ form.username.id_for_label }}">Имя пользователя</label>
            <input 
                type="text" 
                name="{{ form.username.name }}" 
                id="{{ form.username.id_for_label }}" 
                class="form-input" 
                required 
                autofocus
            >
        </div>
        
        <div class="form-group">
            <label for="{{ form.password.id_for_label }}">Пароль</label>
            <input 
                type="password" 
                name="{{ form.password.name }}" 
                id="{{ form.password.id_for_label }}" 
                class="form-input" 
                required
            >
        </div>
        
        <div class="form-actions">
            <a href="{% url 'employee_list' %}" class="btn btn-outline" style="margin-right: auto;">Назад</a>
            <button type="submit" class="btn btn-primary">Войти</button>
        </div>
        
        <!-- Скрытое поле для перенаправления после входа (по умолчанию на главную) -->
        <input type="hidden" name="next" value="{{ next|default:'/' }}">
    </form>
</div>
{% endblock %}
